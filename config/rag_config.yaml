rag:
  chunking:
    section_max_tokens: 50000
    subsection_max_tokens: 2000
    paragraph_max_tokens: 500
    overlap_tokens: 50
  
  retrieval:
    top_k_pre_rerank: 50
    top_k_post_rerank: 20
    similarity_threshold: 0.65
    token_budget: 80000
    
  embedding_model: BAAI/bge-m3
  embedding_dimensions: 1024
  reranker_model: bge-reranker-v2-m3
